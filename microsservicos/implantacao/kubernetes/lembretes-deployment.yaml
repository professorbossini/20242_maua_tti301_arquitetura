apiVersion: apps/v1
kind: Deployment
metadata:
  name: tti301-t3-lembretes-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: tti301-t3-lembretes
  template:
    metadata:
      labels:
        app: tti301-t3-lembretes
    spec:
      containers:
        - name: tti301-lembretes
          image: asbonato/tti301-t3-lembretes
          resources:
            limits:
              memory: 256Mi
              cpu: 1
---
apiVersion: v1
kind: Service
metadata:
  name: tti301-t3-lembretes-service
spec:
  type: NodePort
  selector:
    app: tti301-t3-lembretes
  ports:
  - name: tti301-t3-lembretes
    protocol: TCP
    port: 4000
    targetPort: 4000