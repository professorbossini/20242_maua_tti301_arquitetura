apiVersion: apps/v1
kind: Deployment
metadata:
  name: tti301-t3-barramento-de-eventos-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: tti301-t3-barramento-de-eventos
  template:
    metadata:
      labels:
        app: tti301-t3-barramento-de-eventos
    spec:
      containers:
        - name: tti301-t3-barramento-de-eventos
          image: asbonato/tti301-t3-barramento-de-eventos
          resources:
            limits:
              memory: 256Mi
              cpu: 1
---
apiVersion: v1
kind: Service
metadata:
  name: tti301-t3-barramento-de-eventos-service
spec:
  type: ClusterIP
  selector:
    app: tti301-t3-barramento-de-eventos
  ports:
  - name: tti301-t3-barramento-de-eventos
    protocol: TCP
    port: 10000
    targetPort: 10000
